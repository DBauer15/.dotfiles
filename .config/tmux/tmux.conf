# vim style tmux config
set -g default-command "/usr/bin/zsh"
set -g history-limit 500000
set -g status-right "%m/%d/%Y %H:%M:%S"
set -g status-left "#S #{:host}"
set -g status-left-length 64
set -g escape-time 20

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

# set colors
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# set prefix key
set-option -g prefix C-space
unbind-key C-space
bind-key C-space send-prefix
set -g base-index 1

# Easy config reload
bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# vi is good
setw -g mode-keys vi

# mouse behavior
setw -g mouse on

bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history

bind-key space next-window
bind-key bspace previous-window
bind-key enter next-layout

# use vim-like keys for splits and windows
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind C-l send-keys 'C-l'
bind-key C-o rotate-window

bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical

#set-window-option -g other-pane-height 25
#set-window-option -g other-pane-width 80
#set-window-option -g display-panes-time 1500

bind-key a last-pane
bind-key q display-panes
bind-key c new-window -c "#{pane_current_path}"
bind-key t next-window
bind-key T previous-window

bind-key [ copy-mode
bind-key ] paste-buffer

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Status Bar
set -g @col-prim "#97bd40"
set -g @col-sec "#2e2720"
set-option -g status on

setw -g pane-border-status off
set -g pane-active-border-style fg="#{@col-prim}",bg="#{@col-sec}"
set -g pane-border-style fg="#{@col-sec}",bg="#{@col-sec}"

set -g mode-style fg="#{@col-sec}",bg="#{@col-prim}"
set -g message-style fg="#{@col-sec}",bg="#{@col-prim}"

set-option -g status-interval 1
set-option -g status-position bottom
set-option -g status-justify absolute-centre
set-option -g status-style fg="#{@col-prim}",bg="#{@col-sec}"
set -g window-status-current-style fg="#{@col-sec}",bg="#{@col-prim}"
set -g window-status-current-format " #I-#W "
set -g window-status-format " #I-#W "


# Set window notifications
#setw -g monitor-activity on
#set -g visual-activity on

